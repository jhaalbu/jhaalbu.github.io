<!doctype html>
<html lang="nn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rapportweb WFS – filter + URL + clustering</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }

    .panel, .legend {
      position: absolute; z-index: 1000;
      background: #fff; padding: 10px 12px; border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,.15);
      font: 14px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .panel { top: 12px; left: 12px; min-width: 360px; max-width: 420px; }
    .legend { bottom: 12px; left: 12px; max-width: 420px; max-height: 42vh; overflow: auto; }

    .row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .row > * { flex: 1; }
    input[type="text"], input[type="date"], select, button {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 14px;
      box-sizing: border-box;
    }
    button { cursor: pointer; }
    button:disabled { opacity: .6; cursor: not-allowed; }

    .hint { font-size: 12px; opacity: .75; margin-top: 6px; }
    .status { font-size: 12px; margin-top: 8px; white-space: pre-wrap; }
    .status.ok { color: #1a7f37; }
    .status.bad { color: #b42318; }

    .legend-title { font-weight: 600; margin-bottom: 6px; }
    .legend-item { display: flex; gap: 8px; align-items: center; margin: 4px 0; }
    .swatch { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,.2); }
    .count { margin-left: auto; font-size: 12px; opacity: .75; }

    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,.35);
      box-sizing: border-box;
    }

    .tiny { font-size: 12px; opacity: .85; }
    .sep { height: 1px; background: rgba(0,0,0,.1); margin: 10px 0; }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="panel">
    <div><strong>Rapportweb WFS</strong> <span class="tiny">– filter + URL + clustering</span></div>

    <div class="row">
      <input id="qInput" type="text" placeholder="Tekstsøk (t.d. oppdrag, type, dokid…)" />
    </div>

    <div class="row">
      <input id="fromInput" type="date" title="Frå dato" />
      <input id="toInput" type="date" title="Til dato" />
    </div>

    <div class="row">
      <select id="kvSelect" title="Kvikkleire (berre Geoteknikk)">
        <option value="any">Kvikkleire: (alle)</option>
        <option value="yes">Kvikkleire: ja</option>
        <option value="no">Kvikkleire: nei</option>
      </select>
    </div>

    <div class="row">
      <select id="minzSelect" title="Minimum zoom for å vise data">
        <option value="6">Vis frå zoom 6</option>
        <option value="7">Vis frå zoom 7</option>
        <option value="8" selected>Vis frå zoom 8</option>
        <option value="9">Vis frå zoom 9</option>
        <option value="10">Vis frå zoom 10</option>
      </select>
    </div>

    <div class="row">
      <button id="reloadBtn">Last data på nytt (hentar alt)</button>
      <button id="shareBtn" title="Kopier delbar URL">Kopier URL</button>
    </div>

    <div class="hint">
      Val og filter blir lagra i URL (layers, q, from, to, kv, minz).
      Zoom inn for å vise data (styrt av min zoom).
    </div>

    <div id="status" class="status"></div>
  </div>

  <div class="legend" id="legend">
    <div class="legend-title">Fagområde</div>
    <div id="layerToggles"></div>
    <div class="sep"></div>
    <div class="row" style="margin-bottom:6px;">
  <button id="allOnBtn">Slå på alle</button>
  <button id="allOffBtn">Slå av alle</button>
</div>
    <div class="tiny">Tips: Slå av/på fagområde → URL blir oppdatert automatisk.</div>
  </div>

  <script>
    // -------------------- Konfig --------------------
    const WFS_BASE = "https://ogckart-sn1.atlas.vegvesen.no/rapportweb_1_0/wfs";
    const WFS_VERSION = "2.0.0";
    const OUTPUT_FORMAT = "application/json";

    const MAX_TOTAL_GLOBAL = 50000;  // global maks
    const PAGE_SIZE = 5000;

    const LAYERS = [
      { name: "Geoteknikk",      typeName: "rapportweb_1_0:Geoteknikk" },
      { name: "Geofysikk",       typeName: "rapportweb_1_0:Geofysikk" },
      { name: "Miljøgeoteknikk", typeName: "rapportweb_1_0:Miljogeoteknikk" },
      { name: "Hydraulikk",      typeName: "rapportweb_1_0:Hydraulikk" },
      { name: "Hydrologi",       typeName: "rapportweb_1_0:Hydrologi" },
      { name: "Oseanografi",     typeName: "rapportweb_1_0:Oseanografi" },
      { name: "Geologi",         typeName: "rapportweb_1_0:Geologi" },
      { name: "Skred",           typeName: "rapportweb_1_0:Skred" },
      { name: "Drivsnø",         typeName: "rapportweb_1_0:Drivsno" },
      { name: "Naturfare",       typeName: "rapportweb_1_0:Naturfare" },
      { name: "Naturfareplan",   typeName: "rapportweb_1_0:Naturfareplan" },
      { name: "Vegteknologi",    typeName: "rapportweb_1_0:Vegteknologi" }
    ];

    // -------------------- DOM --------------------
    const statusEl = document.getElementById("status");
    const reloadBtn = document.getElementById("reloadBtn");
    const shareBtn  = document.getElementById("shareBtn");
    const layerTogglesEl = document.getElementById("layerToggles");

    const qInput = document.getElementById("qInput");
    const fromInput = document.getElementById("fromInput");
    const toInput = document.getElementById("toInput");
    const kvSelect = document.getElementById("kvSelect");
    const minzSelect = document.getElementById("minzSelect");

    document.getElementById("allOnBtn")
        .addEventListener("click", () => setAllLayers(true));

    document.getElementById("allOffBtn")
        .addEventListener("click", () => setAllLayers(false));

    function setStatus(msg, kind = "") {
      statusEl.className = "status " + kind;
      statusEl.textContent = msg;
    }

    function escapeHtml(v) {
      return String(v ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;").replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function getProp(props, key) {
      return props?.[key] ?? props?.[`rapportweb_1_0:${key}`] ?? "";
    }

    // -------------------- URL state --------------------
    function getParams() {
      return new URLSearchParams(location.search);
    }

    function setParams(next) {
      const url = new URL(location.href);
      url.search = next.toString();
      history.replaceState(null, "", url);
    }

    function parseCsv(v) {
      return (v || "").split(",").map(s => s.trim()).filter(Boolean);
    }
    function toCsv(arr) {
      return arr.join(",");
    }

    function getEnabledAreasFromUI() {
      return Array.from(layerTogglesEl.querySelectorAll('input[type=checkbox]'))
        .filter(cb => cb.checked)
        .map(cb => cb.dataset.area);
    }

    function applyUrlToUI() {
      const p = getParams();

      const q = p.get("q") || "";
      const from = p.get("from") || "";
      const to = p.get("to") || "";
      const kv = p.get("kv") || "any";
      const minz = p.get("minz") || "8";

      qInput.value = q;
      fromInput.value = from;
      toInput.value = to;
      kvSelect.value = (kv === "yes" || kv === "no" || kv === "any") ? kv : "any";
      minzSelect.value = ["6","7","8","9","10"].includes(minz) ? minz : "8";

      // layers
      const layersCsv = p.get("layers");
      const enabled = layersCsv ? new Set(parseCsv(layersCsv)) : null; // null => default all
      for (const cb of layerTogglesEl.querySelectorAll('input[type=checkbox]')) {
        cb.checked = enabled ? enabled.has(cb.dataset.area) : true;
      }
    }

    function setAllLayers(on) {
        const cbs = layerTogglesEl.querySelectorAll('input[type=checkbox]');
        cbs.forEach(cb => cb.checked = on);

        syncUIToUrl();        // oppdater URL (?layers=...)
        updateVisibility();  // vis/skjul lag basert på zoom
        rebuildMarkersDebounced(); // bygg markørar på nytt med filter
        }

    function syncUIToUrl() {
      const p = getParams();

      const enabledAreas = getEnabledAreasFromUI();
      p.set("layers", toCsv(enabledAreas));

      const q = (qInput.value || "").trim();
      if (q) p.set("q", q); else p.delete("q");

      const from = fromInput.value;
      const to = toInput.value;
      if (from) p.set("from", from); else p.delete("from");
      if (to) p.set("to", to); else p.delete("to");

      const kv = kvSelect.value || "any";
      if (kv && kv !== "any") p.set("kv", kv); else p.delete("kv");

      const minz = minzSelect.value || "8";
      if (minz !== "8") p.set("minz", minz); else p.delete("minz");

      setParams(p);
    }

    // -------------------- Fargar per fagområde --------------------
    function hashString(str) {
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return (h >>> 0);
    }
    function colorForArea(areaName) {
      const h = hashString(areaName) % 360;
      return `hsl(${h} 70% 45%)`;
    }
    const areaColors = new Map(LAYERS.map(l => [l.name, colorForArea(l.name)]));

    // -------------------- Kart + lag --------------------
    const map = L.map("map").setView([64.4, 11.5], 5);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    // Cluster-lag per fagområde
    const areaLayers = new Map(); // areaName -> clusterGroup
    for (const layer of LAYERS) {
      areaLayers.set(
        layer.name,
        L.markerClusterGroup({
          chunkedLoading: true,
          chunkInterval: 200,
          chunkDelay: 50,
          maxClusterRadius: 80,
          disableClusteringAtZoom: 13
        })
      );
    }

    // Rådata per fagområde (features normalisert)
    const areaData = new Map(); // areaName -> NormalizedFeature[]
    // NormalizedFeature: { lat, lon, date: Date|null, hay: string, kv: boolean|null, props: object }
    // hay = tekst for søk

    function buildWfsUrl(typeName, startIndex, count) {
      const params = new URLSearchParams({
        service: "WFS",
        version: WFS_VERSION,
        request: "GetFeature",
        typeNames: typeName,
        outputFormat: OUTPUT_FORMAT,
        srsName: "EPSG:4326",
        count: String(count),
        startIndex: String(startIndex)
      });
      return `${WFS_BASE}?${params.toString()}`;
    }

    function makeDotIcon(color) {
      return L.divIcon({
        className: "",
        html: `<div class="dot" style="background:${color}"></div>`,
        iconSize: [12, 12],
        iconAnchor: [6, 6]
      });
    }

    // -------------------- Kvikkleire deteksjon --------------------
    // Vi veit ikkje sikkert feltnamnet i Geoteknikk. Denne prøver:
    // - nøkkel som inneheld "kvikk" (case-insensitive)
    // - verdi som kan tolkast: true/false, "ja"/"nei", "yes"/"no", 1/0
    function detectKvikkleire(props) {
      if (!props) return null;
      const keys = Object.keys(props);
      const kvKey = keys.find(k => k.toLowerCase().includes("kvikk"));
      if (!kvKey) return null;

      const v = props[kvKey];
      if (v === true) return true;
      if (v === false) return false;

      const s = String(v ?? "").trim().toLowerCase();
      if (!s) return null;

      if (["ja","yes","true","1","y","j"].includes(s)) return true;
      if (["nei","no","false","0","n"].includes(s)) return false;

      return null;
    }

    // -------------------- Normalisering --------------------
    function parseDateMaybe(v) {
    if (!v) return null;

    // Handter tal også
    const s0 = String(v).trim();

    // YYYYMMDD (t.d. 19970214)
    if (/^\d{8}$/.test(s0)) {
        const y = parseInt(s0.slice(0, 4), 10);
        const m = parseInt(s0.slice(4, 6), 10);
        const d = parseInt(s0.slice(6, 8), 10);

        // Basic validering
        if (m < 1 || m > 12 || d < 1 || d > 31) return null;

        const dt = new Date(Date.UTC(y, m - 1, d)); // UTC for stabilitet
        return isNaN(dt.getTime()) ? null : dt;
    }

    // ISO / vanleg dato (YYYY-MM-DD, eller med tid)
    const dt = new Date(s0);
    return isNaN(dt.getTime()) ? null : dt;
    }

    function normalizeFeature(feature, areaName) {
      const g = feature.geometry;
      if (!g || g.type !== "Point" || !Array.isArray(g.coordinates)) return null;

      const [x, y] = g.coordinates;
      const props = feature.properties || {};

      const opp = getProp(props, "OPPDRAGSNAVN");
      const typ = getProp(props, "OPPDRAGSTYPE");
      const dok = getProp(props, "DOKUMENT_ID");
      const url = getProp(props, "URL");
      const datoStr = getProp(props, "DATO");

      // “haystack” for fritekstsøk
      const hay = [
        areaName,
        opp,
        typ,
        dok,
        url,
        datoStr
      ].filter(Boolean).join(" ").toLowerCase();

      const date = parseDateMaybe(datoStr);

      const kv = (areaName === "Geoteknikk") ? detectKvikkleire(props) : null;

      return { lon: x, lat: y, date, hay, kv, props };
    }

    function makePopup(nf, areaName) {
      const p = nf.props || {};
      const url   = getProp(p, "URL");
      const opp   = getProp(p, "OPPDRAGSNAVN");
      const typ   = getProp(p, "OPPDRAGSTYPE");
      const dato  = getProp(p, "DATO");
      const dokid = getProp(p, "DOKUMENT_ID");

      const urlHtml = url
        ? `<a href="${escapeHtml(url)}" target="_blank" rel="noopener">Opne rapport</a>`
        : "(ingen URL)";

      // Vis kvikkleire felt dersom vi har det
      let kvLine = "";
      if (areaName === "Geoteknikk" && nf.kv !== null) {
        kvLine = `<div>Kvikkleire: ${nf.kv ? "ja" : "nei"}</div>`;
      }

      return `
        <div style="min-width:240px">
          <div><strong>${escapeHtml(opp || "Rapport")}</strong></div>
          <div style="margin-top:6px">Fagområde: ${escapeHtml(areaName)}</div>
          <div>Type: ${escapeHtml(typ || "Ukjent")}</div>
          <div>Dato: ${escapeHtml(dato)}</div>
          <div>DokID: ${escapeHtml(dokid)}</div>
          ${kvLine}
          <div style="margin-top:8px">${urlHtml}</div>
        </div>
      `;
    }

    // -------------------- UI: fagområde toggles --------------------
    function renderLayerToggles() {
      layerTogglesEl.innerHTML = LAYERS.map(l => `
        <label class="legend-item" style="cursor:pointer">
          <input type="checkbox" checked data-area="${escapeHtml(l.name)}" />
          <span class="swatch" style="background:${areaColors.get(l.name)}"></span>
          <span>${escapeHtml(l.name)}</span>
          <span class="count" id="count-${escapeHtml(l.name)}">0</span>
        </label>
      `).join("");

      layerTogglesEl.querySelectorAll('input[type=checkbox]').forEach(cb => {
        cb.addEventListener("change", () => {
          syncUIToUrl();
          updateVisibility();
          rebuildMarkersDebounced();
        });
      });
    }
    renderLayerToggles();

    function setLayerCount(areaName, n) {
      // id kan ikkje ha spesialteikn trygt, så vi slår opp via querySelector i staden:
      const el = Array.from(layerTogglesEl.querySelectorAll(".legend-item")).find(row => {
        const cb = row.querySelector('input[type=checkbox]');
        return cb && cb.dataset.area === areaName;
      })?.querySelector(".count");
      if (el) el.textContent = String(n);
    }

    // -------------------- Synlegheit: min zoom + checkbox --------------------
    function getMinZoom() {
      const v = parseInt(minzSelect.value || "8", 10);
      return Number.isFinite(v) ? v : 8;
    }

    function updateVisibility() {
      const z = map.getZoom();
      const minz = getMinZoom();

      for (const layer of LAYERS) {
        const areaName = layer.name;
        const cluster = areaLayers.get(areaName);

        const cb = layerTogglesEl.querySelector(`input[data-area="${CSS.escape(areaName)}"]`);
        const enabled = cb?.checked;

        const shouldShow = enabled && (z >= minz);

        if (shouldShow) {
          if (!map.hasLayer(cluster)) map.addLayer(cluster);
        } else {
          if (map.hasLayer(cluster)) map.removeLayer(cluster);
        }
      }

      if (z < minz) {
        setStatus(`Zoom inn til nivå ${minz} for å vise rapportar`, "");
      }
    }

    map.on("zoomend", updateVisibility);

    // -------------------- Filter + rebuild markers --------------------
    function parseYmd(ymd) {
      if (!ymd) return null;
      const d = new Date(ymd + "T00:00:00");
      return isNaN(d.getTime()) ? null : d;
    }

    function inDateRange(dateObj, fromD, toD) {
      if (!fromD && !toD) return true;
      if (!dateObj) return false; // viss filter er sett, men feature manglar dato => filtrer ut
      const t = dateObj.getTime();
      if (fromD && t < fromD.getTime()) return false;
      if (toD && t > toD.getTime()) return false;
      return true;
    }

    function matchesText(hay, q) {
      if (!q) return true;
      return hay.includes(q);
    }

    function matchesKvikkleire(nf, kvMode) {
      if (kvMode === "any") return true;
      // berre relevant for geoteknikk; for andre: ignorer filter (true)
      if (nf.kv === null) return (kvMode === "any"); // ukjent => ikkje match ja/nei
      if (kvMode === "yes") return nf.kv === true;
      if (kvMode === "no") return nf.kv === false;
      return true;
    }

    function clearAllClusters() {
      for (const layer of LAYERS) {
        areaLayers.get(layer.name).clearLayers();
        setLayerCount(layer.name, 0);
      }
    }

    function rebuildMarkers() {
      // Bygg marker på nytt basert på filter + checkbox (men vi bygg likevel per område,
      // og synlegheit/vising styrast av updateVisibility)
      const q = (qInput.value || "").trim().toLowerCase();
      const fromD = parseYmd(fromInput.value);
      const toD = parseYmd(toInput.value);
      const kvMode = kvSelect.value || "any";

      clearAllClusters();

      let totalShown = 0;

      for (const layer of LAYERS) {
        const areaName = layer.name;
        const data = areaData.get(areaName) || [];
        const cluster = areaLayers.get(areaName);

        const color = areaColors.get(areaName);
        const icon = makeDotIcon(color);

        const markers = [];
        let shownInArea = 0;

        for (const nf of data) {
          if (!matchesText(nf.hay, q)) continue;
          if (!inDateRange(nf.date, fromD, toD)) continue;
          if (areaName === "Geoteknikk" && !matchesKvikkleire(nf, kvMode)) continue;

          const marker = L.marker([nf.lat, nf.lon], { icon });
          marker.bindPopup(makePopup(nf, areaName));
          markers.push(marker);
          shownInArea++;
        }

        // chunkedLoading i clusterGroup hjelper litt, men addLayers kan framleis vere tungt
        cluster.addLayers(markers);

        setLayerCount(areaName, shownInArea);
        totalShown += shownInArea;
      }

      setStatus(`Klar.\nViser ${totalShown} objekt etter filter.`, "ok");
      updateVisibility();
    }

    let rebuildTimer = null;
    function rebuildMarkersDebounced() {
      clearTimeout(rebuildTimer);
      rebuildTimer = setTimeout(() => {
        syncUIToUrl();
        rebuildMarkers();
      }, 250);
    }

    // -------------------- Data-laster --------------------
    let isLoading = false;

    async function loadAllAreas() {
      if (isLoading) return;
      isLoading = true;
      reloadBtn.disabled = true;

      // reset
      for (const layer of LAYERS) areaData.set(layer.name, []);
      clearAllClusters();

      let totalGlobal = 0;
      setStatus(`Startar henting…\n(0 / ${MAX_TOTAL_GLOBAL})`, "");

      try {
        for (const layer of LAYERS) {
          if (totalGlobal >= MAX_TOTAL_GLOBAL) break;

          let startIndex = 0;
          let addedForLayer = 0;

          while (totalGlobal < MAX_TOTAL_GLOBAL) {
            const remainingGlobal = MAX_TOTAL_GLOBAL - totalGlobal;
            const batch = Math.min(PAGE_SIZE, remainingGlobal);

            const url = buildWfsUrl(layer.typeName, startIndex, batch);
            const res = await fetch(url, { mode: "cors" });
            if (!res.ok) throw new Error(`HTTP ${res.status} for ${layer.typeName}`);

            const geojson = await res.json();
            const feats = geojson?.features || [];
            if (feats.length === 0) break;

            const bucket = areaData.get(layer.name);
            for (const f of feats) {
              const nf = normalizeFeature(f, layer.name);
              if (nf) bucket.push(nf);
            }

            addedForLayer += feats.length;
            totalGlobal += feats.length;
            startIndex += feats.length;

            setStatus(
              `Hentar: ${layer.name}\n` +
              `Lag: ${addedForLayer}  |  Totalt: ${totalGlobal} / ${MAX_TOTAL_GLOBAL}`,
              ""
            );

            if (feats.length < batch) break;
          }
        }

        setStatus(`Data lasta.\nByggjer markørar med filter…`, "");
        rebuildMarkers();

      } catch (err) {
        console.error(err);
        setStatus(
          "Feil ved lasting.\nVanleg årsak: CORS/tilgang eller at tenesta ikkje støttar outputFormat=application/json / paging.\n" +
          `Detalj: ${String(err?.message || err)}`,
          "bad"
        );
      } finally {
        isLoading = false;
        reloadBtn.disabled = false;
      }
    }

    // -------------------- Kopier URL --------------------
    shareBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(location.href);
        setStatus("URL kopiert til utklippstavla ✅", "ok");
      } catch {
        // fallback
        prompt("Kopier URL:", location.href);
      }
    });

    // -------------------- Event hooks --------------------
    reloadBtn.addEventListener("click", () => loadAllAreas());

    // Filter-endringar -> URL + rebuild
    qInput.addEventListener("input", rebuildMarkersDebounced);
    fromInput.addEventListener("change", rebuildMarkersDebounced);
    toInput.addEventListener("change", rebuildMarkersDebounced);
    kvSelect.addEventListener("change", rebuildMarkersDebounced);
    minzSelect.addEventListener("change", () => {
      syncUIToUrl();
      updateVisibility();
    });

    // -------------------- Init: URL -> UI -> load --------------------
    // Lag toggles først (gjort), så kan vi lese URL og setje state
    applyUrlToUI();

    // Når UI endrar checkboxar via URL-apply, må vi synce URL slik at standard blir eksplisitt (valfritt)
    syncUIToUrl();

    // Start last
    window.addEventListener("load", () => {
      updateVisibility();
      loadAllAreas();
    });
  </script>
</body>

</html>
